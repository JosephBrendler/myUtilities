#	$OpenBSD: ssh_config,v 1.35 2020/07/17 03:43:42 dtucker Exp $

# This is the ssh client system-wide configuration file.  See
# ssh_config(5) for more information.  This file provides defaults for
# users, and the values can be changed in per-user configuration files
# or on the command line.

# 14 May 2023 - moved to /etc/ssh/ssh_config.d/ in accordance with gentoo
# News release "2023-05-11-openssh"

# Configuration data is parsed as follows:
#  1. command line options
#  2. user-specific file ### <-- ~/.ssh/config (check this also) ###
#  3. system-wide file
# Any configuration value is only changed the first time it is set.
# Thus, host-specific definitions should be at the beginning of the
# configuration file, and defaults at the end.

# Site-wide defaults for some commonly used options.  For a comprehensive
# list of available options, their meanings and defaults, please see the
# ssh_config(5) man page.

 Host *
#   ForwardAgent no
#   ForwardX11 no
#   PasswordAuthentication yes
#   HostbasedAuthentication no
#   GSSAPIAuthentication no
#   GSSAPIDelegateCredentials no
#   BatchMode no
#   CheckHostIP yes
   AddressFamily any
#   ConnectTimeout 0
   StrictHostKeyChecking ask
#   IdentityFile ~/.ssh/id_rsa
#   IdentityFile ~/.ssh/id_dsa
#   IdentityFile ~/.ssh/id_ecdsa
#   IdentityFile ~/.ssh/id_ed25519
#   Port 22
#   Ciphers aes128-ctr,aes192-ctr,aes256-ctr,aes128-cbc,3des-cbc
#   MACs hmac-md5,hmac-sha1,umac-64@openssh.com
#   EscapeChar ~
#   Tunnel no
#   TunnelDevice any:any
#   PermitLocalCommand no
#   VisualHostKey no
#   ProxyCommand ssh -q -W %h:%p gateway.example.com
#   RekeyLimit 1G 1h
#   UserKnownHostsFile ~/.ssh/known_hosts.d/%k


# Host: list automation alias(es) used to select these options for ddns-update
Host elrond-ddns-46*
    # HostName: identify the fqdn of the host alias(es) above must resolve to
    HostName elrond.brendler
    # performance & resilience policy settings
    ControlMaster auto
    ControlPath /tmp/ssh-%r@%h:%p
    ControlPersist 5m
    ConnectTimeout 10
    ServerAliveInterval 15
    ServerAliveCountMax 3
    BatchMode yes
    # note: to prevent redundancy, confusion, and config conflicts, and to enforce apprpriate policy,
    #   (1) fleet-wide performance/resiliency policy (ssh -o options) previously in user ssh config
    #       and the ddns-update script are now consolidated in /etc/ssh/ssh_config.d/01_joetoo_ssh_config.conf
    #   (2) the ddns-update script and root-owned policy file are now free of "sensitive" info and policy settings
    #   (3) sensitive info should remain in the client/user config, for security
    #       (sensitive info should not be stored in files curated in public repositories)


# Read more about SSH config files: https://linux.die.net/man/5/ssh_config

