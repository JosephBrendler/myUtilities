#################################################
# OpenVPN 2.0 config file for                   #
# multi-client server.                          #
# Joe Brendler, 18 July 2014 (redone 13 Dec 16) #
#  (updated 17 May 2026 for ddns support)       #
# This file is for the server side              #
# of a many-clients  one-server                 #
# OpenVPN configuration.                        #
#                                               #
# Comments are preceded with '#' or ';'         #
#################################################
#----- basic info: server; allow up to 100 clients to "see" each other & use same cert
mode server
client-to-client
#duplicate-cn     # possible cause of client restart delays
max-clients 100
tls-server
topology subnet
#----- server binding port, protocol (tcp/udp/tcp6/udp6), tun/tap device
port 9026
proto udp
dev tun0
#----- keys configuration; note: generated on server in /root/easy-rsa-openvpnsetup
#      (symlink serverkeys --> /root/easy-rsa-openvpn-pki-20240219/serverkeys
#      (client-side puts keys distributed from serverkeys into /etc/openvpn/openvpnkeys_2024)
ca serverkeys/ca.crt
cert serverkeys/server_Elrond.crt
key serverkeys/server_Elrond.key
dh serverkeys/dh.pem
#dh serverkeys/dh2048.pem
#----- cryptographic cipher and authentication algorithm (must do on both server and client)
#cipher AES-256-CBC
#auth RSA-SHA256
cipher AES-256-GCM
auth SHA512
#----- optional tls-auth key to secure identifying
tls-auth serverkeys/ta.key 0
#----- OpenVPN 'virtual' network infomation, network and mask
server 192.168.63.0 255.255.255.0   # ipv4 private class c subnet 192.168.63.0/24
#server-ipv6 fd00:0000:0063::/64     # ipv6 unique local address (ULA) prefix fd00:0000:0063::/64
server-ipv6 fd62:6262:6263::/64     # ipv6 unique local address (ULA) prefix fd00:0000:0063::/64
#----- connection management info

#keepalive 10 120          # system default for ping and ping-restart
keepalive 10 60           # shortcut to set both ping and ping-restart (but you cant use both ways)
#ping 10                   # hearbeat
#ping-restart 60           # time lag to server considering client dead
explicit-exit-notify 1    # client tells the server not to wait for ping-restart timeout

#comp-lzo
user nobody
group nobody
#----- persistent device and key settings
persist-key
persist-tun
#ifconfig-pool-persist ipp.txt (trying to use dhcp instead; besides ipp.txt is empty)
#----- pushing ipv4 route tables -----------------------
push "route 192.168.61.0 255.255.255.0"
push "route 192.168.62.0 255.255.255.0"
#push "route 192.168.63.0 255.255.255.0"
# server's ip on the server end of tunnel tun0
push "route 192.168.63.1"
#----- pushing ipv6 route tables -----------------------
#push "route-ipv6 fd00:0000:0061::/64"
push "route-ipv6 fd62:6262:6261::/64"
#push "route-ipv6 fd00:0000:0062::/64"
push "route-ipv6 fd62:6262:6262::/64"
# server's ip on the server end of tunnel tun0
#push "route-ipv6 fd00:0000:0063::/64"
push "route-ipv6 fd62:6262:6263::/64"

# enable client to get  default route for ipv6
push "redirect-gateway ipv6"

#push "route-gateway 192.168.63.1"
push "route-delay 2"
push "dhcp-option DOMAIN brendler"
#push "dhcp-option DNS 192.168.63.1"
push "dhcp-option DNS 192.168.62.17"
push "dhcp-option NTP 192.168.62.17"
#push "dhcp-option DNS6 fd00:0000:0062::17"
#push "dhcp-option DNS6 fd00:0000:0062::1"
push "dhcp-option DNS6 fd62:6262:6262::17"

# client-disconnect event hook script
# (1) for ddns support; (2) also update openvpn-status.log and call openvpn_dns_updater.sh
script-security 2
# enable a client-disconnect event to trigger either or both of the
#  ddns-update-server "delete" and/or openvpn_dns_updater.sh refresh "without"
#  actions that /etc/openvpn/openvpn-ddns-hook.down can take
# Note: -E (--preserve-env) ensures user joe can employ openvpn environment varaibles
# Note: replace <DDNS_USER> with the same user authorized in /etc/conf.d/ddns
#client-disconnect "/usr/bin/sudo -u <DDNS_USER> /etc/openvpn/openvpn-ddns-hook.down"
client-disconnect "/usr/bin/sudo -E -u joe /etc/openvpn/openvpn-ddns-hook.down"

#----- logging
status /var/log/openvpn-status.log 10
#log /var/log/openvpn.log  ## redundant to log-append
log-append /var/log/openvpn.log
# increase verbosity of logging for debugging ...
verb 4
#verb 6
